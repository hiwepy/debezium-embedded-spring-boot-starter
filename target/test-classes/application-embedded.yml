# Debezium Embedded 配置示例
debezium:
  embedded:
    enabled: true
    destination: my-mysql-connector
    connector-class: io.debezium.connector.mysql.MySqlConnector
    host: localhost
    port: 3306
    username: root
    password: password
    database-include-list: test_db
    table-include-list: test_db.users,test_db.orders
    schema-include-list: test_db
    include-schema-changes: false
    database-server-id: 1
    database-server-name: my-mysql-server
    database-history: io.debezium.relational.history.FileDatabaseHistory
    database-history-file-filename: /tmp/dbhistory.dat
  
  # 线程池配置
  thread-pool:
    core-pool-size: 2
    max-pool-size: 4
    queue-capacity: 1000
    keep-alive: 60s
    allow-core-thread-time-out: false
    wait-for-tasks-to-complete-on-shutdown: true
    await-termination-seconds: 30
    thread-name-prefix: debezium-embedded-
    rejected-policy: CallerRunsPolicy
  
  # Offset 存储配置
  offset-storage:
    # 支持的类型: FILE, KAFKA, JDBC, REDIS, S3, CUSTOM
    type: FILE
    
    # File 存储配置
    file:
      file-name: /tmp/debezium-offsets.dat
      flush-interval-ms: 60000
    
    # Kafka 存储配置（当 type: KAFKA 时使用）
    kafka:
      bootstrap-servers: localhost:9092
      topic: debezium-offsets
      partitions: 3
      replication-factor: 1
    
    # JDBC 存储配置（当 type: JDBC 时使用）
    jdbc:
      url: jdbc:mysql://localhost:3306/debezium
      username: root
      password: password
      driver-class-name: com.mysql.cj.jdbc.Driver
      table-name: debezium_offsets
      flush-interval-ms: 60000
    
    # Redis 存储配置（当 type: REDIS 时使用）
    redis:
      host: localhost
      port: 6379
      password: ""
      database: 0
      key-prefix: "debezium:offsets:"
      flush-interval-ms: 60000
    
    # S3 存储配置（当 type: S3 时使用）
    s3:
      bucket-name: my-debezium-bucket
      region: us-west-2
      access-key-id: your-access-key
      secret-access-key: your-secret-key
      endpoint: https://s3.us-west-2.amazonaws.com
      key-prefix: debezium/offsets/
      flush-interval-ms: 60000
    
    # 自定义存储配置（当 type: CUSTOM 时使用）
    custom:
      class-name: com.example.CustomOffsetBackingStore
      props:
        custom.property: value
        cache.ttl.ms: 30000

# 日志配置
logging:
  level:
    io.debezium: INFO
    io.debezium.embedded: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
