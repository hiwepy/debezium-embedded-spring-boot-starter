debezium:
  embedded:
    enabled: true
    destination: "mysql-embedded"
    type: MYSQL
    host: "localhost"
    port: 3306
    username: "debezium"
    password: "dbz"
    server-id: 5400
    server-name: "mysql-server-1"
    database-name: "inventory"
    
    # 数据库和表过滤
    database-include-list: "inventory"
    table-include-list: "inventory.customers,inventory.orders"
    
    # MySQL 特定配置
    mysql:
      snapshot-mode: "initial"
      snapshot-locking-mode: "minimal"
      connect-timeout-ms: 30000
      gtid-source-filter-dml-events: true
      allow-public-key-retrieval: true
      use-ssl: false
      auto-reconnect: true
      allow-multi-queries: true
      zero-date-time-behavior: "convertToNull"
      character-encoding: "utf8"
      use-unicode: true
      tombstones-on-delete: false
      include-query: false
      min-row-count-to-stream-results: 1000
      poll-interval-ms: 1000
      max-queue-size: 8192
      max-batch-size: 2048

  # 存储配置 - 使用 File 存储
  offset-storage:
    type: FILE
    file:
      file-name: "/tmp/debezium-offsets.dat"
      flush-interval-ms: 60000
      flush-timeout-ms: 5000

  # 历史记录配置 - 使用 Redis 存储
  history:
    enabled: true
    type: REDIS
    redis:
      host: "localhost"
      port: 6379
      password: ""
      database: 0
      key-prefix: "debezium:history:"
      connection-timeout: 30000
      read-timeout: 30000
      pool-size: 10

# PostgreSQL 完整配置示例
---
spring:
  config:
    activate:
      on-profile: postgresql-complete

debezium:
  embedded:
    enabled: true
    destination: "postgresql-embedded"
    type: POSTGRESQL
    host: "localhost"
    port: 5432
    username: "postgres"
    password: "postgres"
    database-name: "postgres"
    server-name: "postgresql-server-1"
    
    # 数据库和表过滤
    database-include-list: "postgres"
    table-include-list: "public.users,public.products"
    
    # PostgreSQL 特定配置
    postgresql:
      plugin-name: "pgoutput"
      slot-name: "debezium_slot"
      publication-name: "debezium_pub"
      snapshot-mode: "initial"
      ssl-mode: "prefer"
      ssl-cert: ""
      ssl-key: ""
      ssl-root-cert: ""
      ssl-password: ""
      tombstones-on-delete: false
      include-query: false
      poll-interval-ms: 1000
      max-queue-size: 8192
      max-batch-size: 2048

  # 存储配置 - 使用 Kafka 存储
  offset-storage:
    type: KAFKA
    kafka:
      bootstrap-servers: "localhost:9092"
      topic: "debezium-offsets"
      partitions: 1
      replication-factor: 1

  # 历史记录配置 - 使用 JDBC 存储
  history:
    enabled: true
    type: JDBC
    jdbc:
      url: "jdbc:postgresql://localhost:5432/debezium_history"
      username: "postgres"
      password: "postgres"
      table-name: "database_history"
      pool-size: 10
      connection-timeout: 30000
      query-timeout: 30000

# MongoDB 完整配置示例
---
spring:
  config:
    activate:
      on-profile: mongodb-complete

debezium:
  embedded:
    enabled: true
    destination: "mongodb-embedded"
    type: MONGODB
    host: "localhost"
    port: 27017
    username: "debezium"
    password: "dbz"
    server-name: "mongodb-server-1"
    
    # MongoDB 特定配置
    mongodb:
      connection-string: "mongodb://localhost:27017"
      database-list: "inventory"
      collection-list: "customers,orders"
      snapshot-mode: "initial"
      auth-source: "admin"
      connect-timeout-ms: 30000
      socket-timeout-ms: 30000
      server-selection-timeout-ms: 30000
      max-connection-pool-size: 100
      min-connection-pool-size: 5
      max-connection-idle-time-ms: 30000
      max-connection-life-time-ms: 300000
      tombstones-on-delete: false
      include-query: false
      field-renames: ""
      field-exclude-list: ""
      poll-interval-ms: 1000
      max-queue-size: 8192
      max-batch-size: 2048
      max-queue-size-in-bytes: 1073741824

  # 存储配置 - 使用 Redis 存储
  offset-storage:
    type: REDIS
    redis:
      host: "localhost"
      port: 6379
      password: ""
      database: 0
      key-prefix: "debezium:offsets:"
      flush-interval-ms: 60000
      connection-timeout: 30000
      read-timeout: 30000
      pool-size: 10

  # 历史记录配置 - 使用 File 存储
  history:
    enabled: true
    type: FILE
    file:
      filename: "/tmp/mongodb-history.dat"
      skip-unparseable-ddl: true
      store-only-monitored-tables-ddl: true
      store-only-captured-tables-ddl: true

# S3 历史记录完整配置示例
---
spring:
  config:
    activate:
      on-profile: s3-history-complete

debezium:
  embedded:
    enabled: true
    destination: "mysql-s3-history"
    type: MYSQL
    host: "localhost"
    port: 3306
    username: "debezium"
    password: "dbz"
    server-id: 5401
    server-name: "mysql-server-s3"
    database-name: "inventory"
    
    # 数据库和表过滤
    database-include-list: "inventory"
    table-include-list: "inventory.customers,inventory.orders"
    
    # MySQL 特定配置
    mysql:
      snapshot-mode: "initial"
      snapshot-locking-mode: "minimal"
      connect-timeout-ms: 30000
      gtid-source-filter-dml-events: true
      allow-public-key-retrieval: true
      use-ssl: false
      auto-reconnect: true
      allow-multi-queries: true
      zero-date-time-behavior: "convertToNull"
      character-encoding: "utf8"
      use-unicode: true
      tombstones-on-delete: false
      include-query: false
      min-row-count-to-stream-results: 1000
      poll-interval-ms: 1000
      max-queue-size: 8192
      max-batch-size: 2048

  # 存储配置 - 使用 File 存储
  offset-storage:
    type: FILE
    file:
      file-name: "/tmp/debezium-offsets-s3.dat"
      flush-interval-ms: 60000
      flush-timeout-ms: 5000

  # 历史记录配置 - 使用 S3 存储
  history:
    enabled: true
    type: S3
    s3:
      bucket-name: "my-debezium-history-bucket"
      region: "us-east-1"
      access-key-id: "your-access-key-id"
      secret-access-key: "your-secret-access-key"
      key-prefix: "debezium/history/"
      endpoint-url: "https://s3.amazonaws.com"
      connection-timeout: 30000
      read-timeout: 30000
      max-retries: 3
      retry-delay-ms: 1000
      path-style-access-enabled: false
      signing-region: "us-east-1"
      # 代理配置（可选）
      proxy-host: ""
      proxy-port: 8080
      proxy-username: ""
      proxy-password: ""
