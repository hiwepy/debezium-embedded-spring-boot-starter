# Debezium Embedded 多数据库连接器配置示例

# ========================================
# MySQL 连接器配置
# ========================================
debezium:
  embedded:
    enabled: true
    type: MYSQL
    destination: mysql-connector
    host: localhost
    port: 3306
    username: root
    password: password
    server-id: 1
    server-name: mysql-server
    database-include-list: test_db
    table-include-list: test_db.users,test_db.orders
    history-file-name: /tmp/mysql-dbhistory.dat
    mysql:
      snapshot-mode: initial
      snapshot-locking-mode: minimal
      connect-timeout-ms: 30000
      gtid-source-filter-dml-events: true

