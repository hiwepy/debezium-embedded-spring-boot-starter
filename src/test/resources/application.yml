#########################################################################################################################################################
###Debezium (DebeziumProperties、DebeziumKafkaProperties、DebeziumRabbitMQProperties、DebeziumRocketMQProperties、DebeziumPulsarProperties、DebeziumTcpProperties) 基本配置：
#########################################################################################################################################################
debezium:
  # Debezium 异步消费线程池配置
  thread-pool:
    # 线程池核心线程数。默认为 1
    core-pool-size: 1
    # 线程池最大线程数。默认为 1
    max-pool-size: 1
    # 线程池队列容量。默认为 1000
    queue-capacity: 1000
    # 线程池线程存活时间。默认为 60s
    keep-alive: 60s
  # Debezium Embedded 实例配置
  instances:
    # ========================================
    # MySQL 连接器配置
    # ========================================
    - connector:
        destination: mysql-connector
        type: MYSQL
        # Debezium Server 主机地址。如果设置了address属性，则忽略。
        host: 127.0.0.1
    # ========================================
    # MongoDB 连接器配置
    # ========================================
    - connector:
        destination: mongodb-connector
        # Debezium Server 主机地址。如果设置了address属性，则忽略。
        host: 127.0.0.1
        # Debezium Server 端口。如果设置了address属性，则忽略。默认为 5672
        port: 3306
        # Debezium Server 用户名
        username: xxx
        # Debezium Server 密码
        password: 222
      history:
        file:
          backup: true
      offset-storage:
        type: FILE
        file:
          file-name: /tmp/debezium-offsets.dat
          flush-interval-ms: 60000
          flush-timeout-ms: 5000